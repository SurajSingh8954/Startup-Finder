<section class="contact">

    <!-- Left Side -->
    <div class="contact-info">

        <h2>Get In Touch</h2>

        <p>
            We'd love to hear from you. Feel free to contact us for
            startup collaboration, partnerships, or any questions.
        </p>

        <p><i class="fas fa-envelope"></i> startupfinder@gmail.com</p>

        <p><i class="fas fa-phone"></i> +91 98765 43210</p>

        <p><i class="fas fa-location-dot"></i> Dehradun, Uttarakhand, India</p>

    </div>

    <!-- Right Side -->
    <div class="contact-form">

        <h2>Send Message</h2>

        <form>

            <input type="text" placeholder="Your Name" required>

            <input type="email" placeholder="Your Email" required>

            <textarea placeholder="Your Message" required></textarea>

            <button type="submit">Send Message</button>

        </form>

    </div>

</section>
